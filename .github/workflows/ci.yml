name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: docker compose config
        run: docker compose config -q

      - name: caddy validate
        run: |
          docker run --rm -v "$PWD/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2 caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile

      - name: snapshot example is valid JSON
        run: python3 -c "import json; json.load(open('snapshot.example.json'))"

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks detect --redact --verbose --no-banner --exit-code 1
